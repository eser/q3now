# arenam3_identity_sdr.yaml — auto-generated by `vr_check.py --gen-scenes` (Phase 6B3'-d8).
#
# HUD overlay over the arenam3 map; the 3D scene is tonemapped with the
# identity operator; the swapchain is in sdr mode. The HUD is identity-
# encoded (composited onto the post-tonemap LDR intermediate, then the gamma
# pass sRGB-encodes), so the expected HUD-region colours below are
# independent of identity. Alpha-blended regions pick up some of the
# operator-tonemapped scene underneath, hence the looser tolerance.
#
# NOTE: like the other starter scenes, the expected_regions below are a
# template — they match only once the in-game HUD .wmenu/.whud items carry the
# corresponding `name` tags; until then vr_check reports "no expected regions
# in layoutdump". Treat as scaffolding.
#
# display_mode: sdr    # sdr | hdr10 — sRGB-byte (8bpc) vs PQ-coded (10bpc, A2B10G10R10) readback/expected
# peak_luminance: 1000  # nits — HDR10 only; passed to the engine as r_hdrPeakLuminance

name: arenam3_identity_sdr
operator: identity          # HUD regions are identity-encoded
display_mode: sdr
peak_luminance: 1000

cvars:
  s_initsound: 0
  r_brightness: 1
  r_tonemap: 0      # 0=identity 1=PBR-Neutral 2=AgX 3=Lottes 4=Reinhard
  r_hdrDisplay: 0
  r_hdrPeakLuminance: 1000

map: arenam3
capture_frame: 600
texture: backbuffer

expected_regions:
  - region: hud.accent
    source: { macro: WCOLOR_ACCENT }
    tolerance: 12
  - region: hud.separator
    source: { macro: WCOLOR_SEPARATOR }
    tolerance: 12
