<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 660px;
  height: 570px;
  background: #f0f0f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  overflow: hidden;
}

/* Dark branded header bar */
.header {
  background: #1a1a24;
  padding: 18px 28px;
  display: flex;
  align-items: center;
}
.header .logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 1px;
  line-height: 1;
}
.header .q3 { color: #c84030; }
.header .now { color: #e8e8f0; }

/* Chevron between icons */
.chevron {
  position: absolute;
  top: 190px;
  left: 50%;
  transform: translateX(-50%);
}
.chevron svg {
  width: 40px;
  height: 40px;
}

/* Bottom instruction */
.install-text {
  position: absolute;
  top: 370px;
  left: 50%;
  transform: translateX(-50%);
  color: #888;
  font-size: 13px;
  white-space: nowrap;
}
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><span class="q3">q3</span><span class="now">now</span></div>
  </div>

  <div class="chevron">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 6l6 6-6 6" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="install-text">To install, drag q3now to the Applications folder.</div>
</body>
</html>
