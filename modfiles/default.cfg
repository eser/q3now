//
// KEY BINDINGS
//

unbindall

//
// weapons
//
bind	1		    "weapon 1"
bind	2		    "weapon 2"
bind	3		    "weapon 3"
bind	4		    "weapon 4"
bind	5		    "weapon 5"
bind	6		    "weapon 6"
bind	7		    "weapon 7"
bind	8		    "weapon 8"
bind	9		    "weapon 9"
bind	0		    "weapon 10"

bind	ENTER		+use
bind	CTRL		+use

bind	mwheelup	weapprev
bind	mwheeldown	weapnext
bind    [           weapprev
bind    ]           weapnext
bind	r			weapnext
bind	e			weapongrabbed
bind	\			weapongrabbed

bind    q           +zoom
bind    x           +thirdperson
bind    zoom        +button3

//
// CHARACTER CONTROLS
//

bind    SHIFT 		+speed

bind	c           +movedown
bind    SPACE       +moveup 

bind    w           +forward
bind    a           +moveleft
bind    s           +back
bind    d           +moveright

//
// CLIENT ENVIRONMENT COMMANDS
//

bind    PAUSE       pause
bind    ESCAPE      togglemenu
bind    ~           toggleconsole
bind    `           toggleconsole

bind    TAB         +scores

bind    F1          "vote yes"
bind	F2			"vote no"
bind	F3			ui_teamorders

//
//	DEVELOPER KEYS
//
bind 	F11			screenshotJPEG

bind    t           messagemode
bind    y           messagemode2

//
// MOUSE BUTTONS
//

bind    MOUSE1      +attack
bind    MOUSE2      +attackalt
bind    MOUSE3      +zoom
