# q3now default SuperHUD — competitive layout

# ── Global defaults ─────────────────────────────────────
!DEFAULT { font sansman; fontsize 8 12; textstyle 1; color 1 1 1 1; }

# ── Top Score Bar ──────────────────────────────────────
!default{}
PreDecorate { rect 215 0 210 20; bgcolor 0.1 0.1 0.15 0.6; fill; }
PreDecorate { rect 319 0 2 20; image "white"; color 0.85 0.1 0.1 1; }
Score_OWN { rect 312 0 0 20; fontsize 14 18; textalign R; alignv C; color 1 1 1 1; }
Score_NME { rect 328 0 0 20; fontsize 14 18; textalign L; alignv C; color 1 1 1 1; }

# ── Names ──────────────────────────────────────────────
!default { fontsize 6 8; color 1 1 1 0.6; }
Name_OWN { rect 232 0 0 20; textalign L; alignv C; }
Name_NME { rect 408 0 0 20; textalign R; alignv C; }

# ── Timer ──────────────────────────────────────────────
!default{}
GameTime { rect 320 22 0 0; fontsize 10 14; textalign C; color 1 1 1 0.8; }

# ── Stats (top right) ──────────────────────────────────
!default { fontsize 8 10; color 1 1 1 0.2; textalign R; }
FPS { rect 638 2 0 0; }

# ── Gametype ───────────────────────────────────────────
!default{}
gametype { rect 4 3 0 0; fontsize 10 14; textalign L; color 1 1 1 1; }

# ── Weapon List (left side) ───────────────────────────
# color2 = active weapon highlight background
!default{}
WeaponList { rect 2 60 16 15; fontsize 10 13; textalign L; color 1 1 1 0.5; bgcolor 0.1 0.1 0.1 0.35; color2 0.4 0.2 0.6 0.5; direction T; }

# ── Health (bottom center-left) ───────────────────────
!default{}
PreDecorate { rect 130 430 190 5; image "white"; color 0.12 0.12 0.12 0.5; }
StatusBar_HealthBar { rect 130 430 190 5; color 1 1 1 0.9; direction R; }
StatusBar_HealthCount { rect 298 438 0 0; fontsize 28 34; textalign R; color 1 1 1 1; }
StatusBar_HealthIcon { rect 298 444 14 18; }

# ── Armor (bottom center-right) ───────────────────────
!default{}
PreDecorate { rect 340 430 190 5; image "white"; color 0.12 0.12 0.12 0.5; }
StatusBar_ArmorBar { rect 340 430 190 5; color 1 1 1 0.9; direction L; }
StatusBar_ArmorIcon { rect 342 444 14 18; }
StatusBar_ArmorCount { rect 364 438 0 0; fontsize 28 34; textalign L; color 1 1 1 1; }

# ── Ammo (bottom far right) ──────────────────────────
!default{}
StatusBar_AmmoCount { rect 588 438 0 0; fontsize 22 28; textalign R; color 1 1 1 1; }
StatusBar_AmmoIcon { rect 596 442 16 20; }
AmmoMessage { rect 320 130 0 0; fontsize 10 12; color 1 0 0 0.8; textalign C; }

# ── Stats (bottom left) ──────────────────────────────
!default { fontsize 8 10; color 1 1 1 0.2; textalign L; }
PlayerSpeed { rect 3 452 0 0; }

# ── Spectator ─────────────────────────────────────────
!default { fontsize 8 12; }
FollowMessage { rect 2 140 0 0; }
SpecMessage { rect 2 140 0 0; }

# ── Frag Message ──────────────────────────────────────
!default { textalign C; time 3000; fadedelay 1000; fade 1 1 1 0; }
FragMessage { rect 320 72 0 0; fontsize 10 14; color 1 1 1 1; }
RankMessage { rect 320 88 0 0; fontsize 9 12; }

# ── Chat (bottom-left, above health bar) ─────────────
!DEFAULT { fade 1 1 1 0; monospace; font id; fontsize 6 9; time 8000; fadedelay 2000; color 1 1 1 0.7; textalign L; }
Chat8 { rect 4 322 300 12; }
Chat7 { rect 4 334 300 12; }
Chat6 { rect 4 346 300 12; }
Chat5 { rect 4 358 300 12; }
Chat4 { rect 4 370 300 12; }
Chat3 { rect 4 382 300 12; }
Chat2 { rect 4 394 300 12; }
Chat1 { rect 4 406 300 12; }

# ── Vote ──────────────────────────────────────────────
!default { font id; fontsize 6 10; textalign L; color 1 1 0 1; }
VoteMessageWorld { rect 2 60 0 12; }

# ── Powerups ──────────────────────────────────────────
!DEFAULT { bgcolor 0 0 0 0; textalign R; fontsize 12 16; }
PowerUp1_Icon { rect 610 270 18 24; }
PowerUp1_Time { rect 606 275 0 0; }
PowerUp2_Icon { rect 610 230 18 24; }
PowerUp2_Time { rect 606 235 0 0; }

# ── Crosshair Info ────────────────────────────────────
!default { fontsize 8 12; textalign C; fadedelay 250; time 100; fade 1 1 1 0; }
TargetName { rect 320 280 0 12; }
TargetStatus { rect 320 294 0 12; }

# ── Item Pickup ───────────────────────────────────────
!default { fontsize 8 12; textalign C; time 3000; fadedelay 1000; fade 1 1 1 0; }
ItemPickup { rect 320 310 0 12; }
ItemPickupIcon { rect 312 334 16 20; }

# ── Flags (CTF) ──────────────────────────────────────
!default{}
FlagStatus_OWN { rect 216 2 14 20; color T; }
FlagStatus_NME { rect 424 2 14 20; color E; }

# ── Team Count ────────────────────────────────────────
!default { fontsize 10 14; textalign C; color 1 1 1 1; bgcolor 0 0 0 0.3; fill; }
TeamCount_OWN { rect 200 2 16 20; }
TeamCount_NME { rect 440 2 16 20; }

# ── Team Overlay ──────────────────────────────────────
!DEFAULT { fontsize 6 10; textalign L; bgcolor 0.75 0.75 0.75 0.25; fill; monospace; color 1 1 1 1; }
Team8 { rect 4 340 0 10; }
Team7 { rect 4 350 0 10; }
Team6 { rect 4 360 0 10; }
Team5 { rect 4 370 0 10; }
Team4 { rect 4 380 0 10; }
Team3 { rect 4 390 0 10; }
Team2 { rect 4 400 0 10; }
Team1 { rect 4 410 0 10; }

# ── Rewards ───────────────────────────────────────────
!default { fadedelay 1800; time 200; fade 1 1 1 0; }
RewardIcons { rect 20 440 18 22; color 1 1 1 1; }
RewardNumbers { rect 20 450 18 22; textalign C; fontsize 6 8; }

# ── Warmup ────────────────────────────────────────────
!default { fontsize 8 10; textalign C; }
warmupinfo { rect 320 70 0 0; }
