<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Q3Now — Server Status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#c0c0cc;font:13px/1.5 'Consolas','Monaco',monospace;overflow:hidden;height:100vh}
header{background:#0e0e1c;border-bottom:2px solid #2a3a8a;padding:10px 18px;display:flex;align-items:center;gap:16px;height:46px}
header h1{font-size:16px;color:#7080ee;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.srv{color:#606080;font-size:11px;display:flex;gap:12px;flex-wrap:wrap}
.srv b{color:#9aabff}
#dot{width:7px;height:7px;border-radius:50%;background:#44cc44;flex-shrink:0;transition:background .4s}
#dot.stale{background:#cc4444}
.layout{display:flex;height:calc(100vh - 46px)}
.pane{overflow-y:auto;padding:14px}
.left{width:55%;border-right:1px solid #181828}
.right{width:45%}
h2{font-size:10px;letter-spacing:2px;color:#404070;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #141424;padding-bottom:5px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#404070;text-align:left;padding:3px 7px;letter-spacing:1px;text-transform:uppercase}
td{padding:4px 7px;border-bottom:1px solid #0e0e1c;white-space:nowrap}
tr:hover td{background:#0c0c18}
.r{text-align:right}
.sc{color:#ffcc44;font-weight:bold}
.de{color:#ff5555}
.pg{color:#44aa55}
.dead td{opacity:.4}
.t0{color:#c0c0cc}
.t1{color:#ff6060}
.t2{color:#5090ff}
.evlist{list-style:none}
.evlist li{padding:4px 6px;border-bottom:1px solid #0d0d1a;font-size:12px;line-height:1.4}
.evlist li:hover{background:#0c0c18}
.eki{color:#ff7744}
.ech{color:#44cc88}
.eit{color:#ccaa22}
.et{color:#2a2a4a;font-size:10px;float:right;margin-left:8px}
.empty{color:#282840;font-size:11px;padding:16px 0}
</style>
</head>
<body>
<header>
  <span id="dot"></span>
  <h1 id="mapname">Q3Now</h1>
  <div class="srv" id="meta"></div>
</header>
<div class="layout">
  <section class="pane left">
    <h2>Scoreboard</h2>
    <table>
      <thead><tr>
        <th>Player</th>
        <th class="r sc">Score</th>
        <th class="r">K/D</th>
        <th class="r">Eff%</th>
        <th class="r">Dmg</th>
        <th class="r">Att</th>
        <th class="r">Acc%</th>
        <th class="r pg">Ping</th>
      </tr></thead>
      <tbody id="ptbody"></tbody>
    </table>
    <p class="empty" id="noplayers"></p>
  </section>
  <section class="pane right">
    <h2>Event Feed</h2>
    <ul class="evlist" id="evlist"></ul>
    <p class="empty" id="noevents"></p>
  </section>
</div>
<script>
var POLL=2000,MAX_EV=80;
var GT=['Deathmatch','Duel','King of the Hill','Last Man Standing','Team Deathmatch','Capture the Flag','One Flag CTF','Overload','Harvester','Freeze Tag'];

function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var Q3C=['#444','#f55','#5d5','#ff5','#58f','#5ff','#f5f','#fff','#f95','#dd5'];
function q3name(raw){
  if(!raw)return '';
  var parts=String(raw).split(/([\^][0-9])/);
  var out='',color='';
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    if(p.length===2&&p[0]==='^'){color=Q3C[+p[1]];}
    else if(p){out+=color?'<span style="color:'+color+'">'+h(p)+'</span>':h(p);}
  }
  return out;
}

function ts(ms){
  var d=new Date(ms);
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function renderPlayers(players,gt){
  var tb=document.getElementById('ptbody');
  var np=document.getElementById('noplayers');
  if(!players||!players.length){tb.innerHTML='';np.textContent='No players connected.';return;}
  np.textContent='';
  var sorted=players.slice().sort(function(a,b){return b.score-a.score;});
  tb.innerHTML=sorted.map(function(p){
    var tc=(p.team===1)?'t1':(p.team===2)?'t2':'t0';
    var k=p.score||0, d=p.deaths||0, s=p.shots||0, hits=p.hits||0;
    var eff=k+d>0?Math.round(k*100/(k+d)):0;
    var acc=s>0?Math.round(hits*100/s):0;
    return '<tr class="'+(p.alive?'':'dead')+'">'
      +'<td class="'+tc+'">'+q3name(p.name)+'</td>'
      +'<td class="r sc">'+k+'</td>'
      +'<td class="r">'+k+'/'+d+'</td>'
      +'<td class="r">'+(k+d>0?eff+'%':'—')+'</td>'
      +'<td class="r">'+(p.dmg||0)+'</td>'
      +'<td class="r">'+s+'</td>'
      +'<td class="r">'+(s>0?acc+'%':'—')+'</td>'
      +'<td class="r pg">'+p.ping+'</td>'
      +'</tr>';
  }).join('');
}

function renderEvents(events){
  var ul=document.getElementById('evlist');
  var ne=document.getElementById('noevents');
  if(!events||!events.length){ul.innerHTML='';ne.textContent='No events yet.';return;}
  ne.textContent='';
  var recent=events.slice().reverse().slice(0,MAX_EV);
  ul.innerHTML=recent.map(function(ev){
    var t='<span class="et">'+ts(ev.time)+'</span>';
    if(ev.type==='kill'){
      return '<li>'+t+'<span class="eki">&#9760;</span> <b>'+q3name(ev.attacker)+'</b> fragged <b>'+q3name(ev.victim)+'</b> ('+h(ev.weapon)+')</li>';
    }
    if(ev.type==='chat'){
      return '<li>'+t+'<span class="ech">&#9656;</span>'+(ev.team?'[T] ':'')+' <b>'+q3name(ev.player)+'</b>: '+h(ev.message)+'</li>';
    }
    if(ev.type==='item'){
      return '<li>'+t+'<span class="eit">&#9733;</span> <b>'+q3name(ev.player)+'</b> picked up '+h(ev.item)+'</li>';
    }
    return '';
  }).filter(Boolean).join('');
}

function poll(){
  fetch('/status.json').then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    document.getElementById('dot').className='';
    var s=d.server||{};
    document.getElementById('mapname').textContent='q3now';
    var gt=s.gametype||0;
    var mapshort=s.map||'';
    var maplong=(s.maplong&&s.maplong!==mapshort)?s.maplong+' ('+mapshort+')':mapshort;
    var meta='<b>'+h(maplong)+'</b>';
    meta+=' &mdash; <b>'+(GT[gt]||'GT'+gt)+'</b>';
    if(s.fraglimit) meta+=' &mdash; Fraglimit <b>'+s.fraglimit+'</b>';
    if(s.timelimit) meta+=' &mdash; Timelimit <b>'+s.timelimit+'m</b>';
    if(s.scorelimit)meta+=' &mdash; Scorelimit <b>'+s.scorelimit+'</b>';
    document.getElementById('meta').innerHTML=meta;
    renderPlayers(d.players||[],gt);
    renderEvents(d.events||[]);
  }).catch(function(){
    document.getElementById('dot').className='stale';
  });
}

poll();
setInterval(poll,POLL);
</script>
</body>
</html>
