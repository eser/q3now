name: build

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  release:
    types: [published]
  workflow_dispatch:

env:
  WASI_SDK_VERSION: "32"

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -y install cmake ninja-build libcurl4-openssl-dev \
          mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev \
          libasound-dev libxss-dev libxcursor-dev libxi-dev libxinerama-dev \
          libxfixes-dev libxkbcommon-dev libwayland-dev libdecor-0-dev \
          libpipewire-0.3-dev libpulse-dev libegl-dev libdrm-dev libgbm-dev \
          libwebkit2gtk-4.1-dev libgtk-3-dev
        # SDL3 is not in Ubuntu 24.04 repos — build from source
        git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL3
        cmake -S /tmp/SDL3 -B /tmp/SDL3/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build /tmp/SDL3/build --parallel
        sudo cmake --install /tmp/SDL3/build

    - name: Install wasi-sdk
      run: |
        curl -sL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz" \
          | sudo tar xz -C /opt
        sudo ln -sf /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build and package
      run: make release Q3DIR=${{ runner.temp }}/q3now WAILS_TAGS="-tags webkit2_41"

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: linux-x86_64
        path: build/release/*.tar.gz
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/release/*.tar.gz

  macos-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: brew install cmake ninja sdl3 molten-vk create-dmg

    - name: Install wasi-sdk
      run: |
        curl -sL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-arm64-macos.tar.gz" \
          | sudo tar xz -C /opt
        sudo ln -sf /opt/wasi-sdk-${WASI_SDK_VERSION}.0-arm64-macos /opt/wasi-sdk

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build and package
      run: make release Q3DIR=${{ runner.temp }}/q3now.app

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: macos-arm64-dmg
        path: build/release/*.dmg
        if-no-files-found: error
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/release/*.dmg

  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: choco install ninja -y

    - name: Install wasi-sdk
      shell: bash
      run: |
        curl -sLo /tmp/wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-windows.tar.gz"
        mkdir -p "$USERPROFILE/wasi-sdk" && tar xzf /tmp/wasi-sdk.tar.gz --strip-components=1 -C "$USERPROFILE/wasi-sdk"

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build game engine
      shell: bash
      run: |
        export MSYS2_ARG_CONV_EXCL="-DWASI_SDK_PATH="
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DUSE_SDL=OFF -DUSE_WASM=ON -DWASI_SDK_PATH="$USERPROFILE/wasi-sdk" -DWASI_SDK_PATH=/opt/wasi-sdk
        cmake --build build --parallel

    - name: Verify QVMs
      shell: bash
      run: |
        ls build/Release/baseq3/vm/cgame.qvm  && echo "cgame  QVM: OK" || echo "cgame  QVM: MISSING (expected on Windows)"
        ls build/Release/baseq3/vm/qagame.qvm && echo "qagame QVM: OK" || echo "qagame QVM: MISSING (expected on Windows)"
        ls build/Release/baseq3/vm/ui.qvm     && echo "ui     QVM: OK" || echo "ui     QVM: MISSING (expected on Windows)"

    - name: Build launcher
      shell: bash
      run: |
        cd launcher && wails build \
          -ldflags "-X main.version=$(git describe --always --dirty)"

    - name: Package zip
      shell: pwsh
      run: |
        $version = git describe --always --dirty
        $staging = "build/staging"
        New-Item -ItemType Directory -Force -Path "$staging/baseq3"
        Copy-Item "build/q3now.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now-ded.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "launcher/build/bin/q3now-launcher.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now_opengl_x86_64.dll" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now_vulkan_x86_64.dll" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/Release/baseq3/*" "$staging/baseq3/" -ErrorAction SilentlyContinue
        Copy-Item "README.md" "$staging/"
        Compress-Archive -Path "$staging/*" -DestinationPath "build/q3now-$version-windows-x86_64.zip" -Force
        Remove-Item -Recurse -Force "$staging"

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: windows-x86_64
        path: build/*.zip
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.zip
