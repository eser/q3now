name: build

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.3.0). Leave empty for CI-only build.'
        required: false
        default: ''
        type: string

env:
  WASI_SDK_VERSION: "32"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ github.event.inputs.version != '' && 'true' || 'false' }}
      version: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v6
        if: github.event.inputs.version != ''
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate version
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Version must start with vX.Y.Z"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Create and push tag
        if: github.event.inputs.version != ''
        run: |
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

  lint:
    name: Lint (clang-tidy + clang-format)
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -y install cmake ninja-build clang-tidy clang-format \
          libcurl4-openssl-dev libopus-dev libopusfile-dev \
          libasound-dev mesa-common-dev libegl-dev libgbm-dev libdrm-dev

    - name: Configure (generate compile_commands.json)
      run: |
        cmake -B build/lint -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DUSE_SDL=OFF -DUSE_WASM=OFF \
          -DBUILD_GAME_LIBRARIES=ON
        cp build/lint/compile_commands.json .

    # PR mode: changed-files-only — fast feedback, also matches the
    # "clang-format is on-demand" project policy (legacy drift not gated).
    # Push mode: full-tree sweep — regression gate on already-clean code.
    - name: Determine changed files (PR)
      if: github.event_name == 'pull_request'
      id: changed
      shell: bash
      run: |
        base="${{ github.base_ref }}"
        git fetch origin "$base" --depth=1
        all=$(git diff --name-only --diff-filter=ACMR "origin/$base"...HEAD \
          | grep -E '^code/(cgame|game|qcommon|server|client|botlib|renderer|renderer2|renderercommon|renderervk|sdl|unix|win32)/.*\.(c|h)$' || true)
        c_only=$(echo "$all" | grep -E '\.c$' || true)
        # Use $'\n' delimiter so multiline outputs survive GHA's parser.
        {
          echo "all<<EOF"
          echo "$all"
          echo "EOF"
          echo "c_only<<EOF"
          echo "$c_only"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: clang-format (PR — changed files)
      if: github.event_name == 'pull_request' && steps.changed.outputs.all != ''
      shell: bash
      run: |
        echo "${{ steps.changed.outputs.all }}" | xargs clang-format --dry-run --Werror --style=file

    - name: clang-tidy (PR — changed .c files)
      if: github.event_name == 'pull_request' && steps.changed.outputs.c_only != ''
      shell: bash
      run: |
        echo "${{ steps.changed.outputs.c_only }}" | while IFS= read -r f; do
          [ -z "$f" ] && continue
          clang-tidy -p . "$f"
        done

    - name: clang-tidy (push — full engine + game sweep)
      if: github.event_name != 'pull_request'
      shell: bash
      run: |
        find code/cgame code/game code/qcommon code/server code/client code/sdl \
             code/botlib code/renderer code/renderer2 code/renderervk code/renderercommon \
             -name '*.c' | grep -vE 'sv_rankings\.c|g_rankings\.c' | while IFS= read -r f; do
          clang-tidy -p . "$f"
        done

  linux-x86_64:
    name: Linux x86_64
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Fetch release tag
      if: needs.prepare.outputs.is_release == 'true'
      run: git fetch --tags

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -y install cmake ninja-build libcurl4-openssl-dev \
          mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev \
          libasound-dev libxss-dev libxcursor-dev libxi-dev libxinerama-dev \
          libxfixes-dev libxkbcommon-dev libwayland-dev libdecor-0-dev \
          libpipewire-0.3-dev libpulse-dev libegl-dev libdrm-dev libgbm-dev \
          libwebkit2gtk-4.1-dev libgtk-3-dev \
          libopus-dev libopusfile-dev
        # SDL3 is not in Ubuntu 24.04 repos — build from source
        git clone --depth 1 https://github.com/libsdl-org/SDL.git /tmp/SDL3
        cmake -S /tmp/SDL3 -B /tmp/SDL3/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build /tmp/SDL3/build --parallel
        sudo cmake --install /tmp/SDL3/build

    - name: Install wasi-sdk
      run: |
        curl -sL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz" \
          | sudo tar xz -C /opt
        sudo ln -sf /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build and package
      run: make release CHANNEL=public Q3DIR=${{ runner.temp }}/q3now WAILS_TAGS="-tags webkit2_41"

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'push' || needs.prepare.outputs.is_release == 'true'
      with:
        name: linux-x86_64
        path: build/release/*.tar.gz
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: needs.prepare.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.version }}
        name: ${{ needs.prepare.outputs.version }}
        generate_release_notes: true
        files: build/release/*.tar.gz

  macos-arm64:
    name: macOS arm64
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Fetch release tag
      if: needs.prepare.outputs.is_release == 'true'
      run: git fetch --tags

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: brew install cmake ninja sdl3 molten-vk create-dmg opus opusfile

    - name: Install wasi-sdk
      run: |
        curl -sL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-arm64-macos.tar.gz" \
          | sudo tar xz -C /opt
        sudo ln -sf /opt/wasi-sdk-${WASI_SDK_VERSION}.0-arm64-macos /opt/wasi-sdk

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build and package
      run: make release CHANNEL=public Q3DIR=${{ runner.temp }}/q3now.app

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'push' || needs.prepare.outputs.is_release == 'true'
      with:
        name: macos-arm64-dmg
        path: build/release/*.dmg
        if-no-files-found: error
        retention-days: 5

    - name: Upload to release
      if: needs.prepare.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.version }}
        name: ${{ needs.prepare.outputs.version }}
        generate_release_notes: true
        files: build/release/*.dmg

  windows-x86_64:
    name: Windows x86_64
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Fetch release tag
      if: needs.prepare.outputs.is_release == 'true'
      shell: bash
      run: git fetch --tags

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache-dependency-path: launcher/go.sum

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: choco install ninja -y

    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-opus
          mingw-w64-x86_64-opusfile
          mingw-w64-x86_64-pkg-config
        path-type: inherit

    - name: Install wasi-sdk
      shell: pwsh
      run: |
        $url = "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-$env:WASI_SDK_VERSION/wasi-sdk-$env:WASI_SDK_VERSION.0-x86_64-windows.tar.gz"
        $archive = "$env:RUNNER_TEMP\wasi-sdk.tar.gz"
        Invoke-WebRequest -Uri $url -OutFile $archive
        New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\wasi-sdk"
        tar xzf $archive --strip-components=1 -C "$env:USERPROFILE\wasi-sdk"

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build and package
      shell: bash
      env:
        OPENSSL_ROOT_DIR: "${{ runner.temp }}/msys64/mingw64"
      # PATH adjustments and quirks:
      #
      # (1) Strawberry Perl is preinstalled on windows-2025 runners and ships
      #     a broken pkg-config.bat that bails out with "Can't find … on
      #     PATH, '.' not in PATH." regardless of what's actually being
      #     queried. Wails' `Generating bindings` step invokes CGo on
      #     gopkg.in/hraban/opus.v2 which calls pkg-config; Strawberry's
      #     wrapper is found first and fails. Prepend MSYS2's mingw64/bin
      #     so the real pkg-config.exe (which can find opus.pc / opusfile.pc
      #     installed via mingw-w64-x86_64-{opus,opusfile,pkg-config}) wins.
      #
      # (2) USERPROFILE arrives as Windows-form (C:\Users\...); CMake's
      #     parser interprets backslashes in -D values as escape sequences
      #     (\U, \r) and corrupts the path. Convert \ → / via bash parameter
      #     expansion so cmake sees a clean forward-slash path.
      run: |
        export PATH="${{ runner.temp }}/msys64/mingw64/bin:$PATH"
        WASI_HOME="${USERPROFILE//\\//}/wasi-sdk"
        make release CHANNEL=public Q3DIR=dist/q3now USE_SDL=0 WASI_SDK_PATH="$WASI_HOME"

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'push' || needs.prepare.outputs.is_release == 'true'
      with:
        name: windows-x86_64
        path: dist/q3now/
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: needs.prepare.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.version }}
        name: ${{ needs.prepare.outputs.version }}
        generate_release_notes: true
        files: build/release/*.zip

  docker:
    name: Docker image
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Fetch release tag
      if: needs.prepare.outputs.is_release == 'true'
      run: git fetch --tags

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: eserozvataf/q3now
        tags: |
          type=sha
          type=ref,event=branch
          type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name == 'push' || needs.prepare.outputs.is_release == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.event_name == 'push' || needs.prepare.outputs.is_release == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
