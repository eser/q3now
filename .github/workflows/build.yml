name: build

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -y install cmake ninja-build libcurl4-openssl-dev \
          mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev \
          libasound-dev libsdl3-dev \
          libwebkit2gtk-4.0-dev libgtk-3-dev

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build game engine
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Verify QVMs
      run: |
        ls build/Release/baseq3/vm/cgame.qvm  && echo "cgame  QVM: OK"
        ls build/Release/baseq3/vm/qagame.qvm && echo "qagame QVM: OK"
        ls build/Release/baseq3/vm/ui.qvm     && echo "ui     QVM: OK"

    - name: Build launcher
      run: |
        cd launcher && wails build \
          -ldflags "-X main.version=$(git describe --always --dirty)"

    - name: Package tar.gz
      run: make tar Q3DIR=${{ runner.temp }}/q3now

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: linux-x86_64
        path: build/*.tar.gz
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.tar.gz

  macos-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: brew install cmake ninja sdl3 molten-vk create-dmg

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build game engine
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Verify QVMs
      run: |
        ls build/Release/baseq3/vm/cgame.qvm  && echo "cgame  QVM: OK"
        ls build/Release/baseq3/vm/qagame.qvm && echo "qagame QVM: OK"
        ls build/Release/baseq3/vm/ui.qvm     && echo "ui     QVM: OK"

    - name: Install, package DMG
      run: make dmg Q3DIR=${{ runner.temp }}/q3now

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: macos-arm64-dmg
        path: build/*.dmg
        if-no-files-found: error
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.dmg

  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - uses: actions/setup-node@v4
      with:
        node-version: '25.8.0'

    - name: Install system dependencies
      run: choco install cmake ninja -y

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build game engine
      shell: bash
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Verify QVMs
      shell: bash
      run: |
        ls build/Release/baseq3/vm/cgame.qvm  && echo "cgame  QVM: OK" || echo "cgame  QVM: MISSING (expected on Windows)"
        ls build/Release/baseq3/vm/qagame.qvm && echo "qagame QVM: OK" || echo "qagame QVM: MISSING (expected on Windows)"
        ls build/Release/baseq3/vm/ui.qvm     && echo "ui     QVM: OK" || echo "ui     QVM: MISSING (expected on Windows)"

    - name: Build launcher
      shell: bash
      run: |
        cd launcher && wails build \
          -ldflags "-X main.version=$(git describe --always --dirty)"

    - name: Package zip
      shell: pwsh
      run: |
        $version = git describe --always --dirty
        $staging = "build/staging"
        New-Item -ItemType Directory -Force -Path "$staging/baseq3"
        Copy-Item "build/q3now.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now-ded.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "launcher/build/bin/q3now-launcher.exe" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now_opengl_x86_64.dll" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/q3now_vulkan_x86_64.dll" "$staging/" -ErrorAction SilentlyContinue
        Copy-Item "build/Release/baseq3/*" "$staging/baseq3/" -ErrorAction SilentlyContinue
        Copy-Item "README.md" "$staging/"
        Compress-Archive -Path "$staging/*" -DestinationPath "build/q3now-$version-windows-x86_64.zip" -Force
        Remove-Item -Recurse -Force "$staging"

    - uses: actions/upload-artifact@v4
      if: github.event_name == 'release' || github.event_name == 'push'
      with:
        name: windows-x86_64
        path: build/*.zip
        if-no-files-found: warn
        retention-days: 5

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.zip
